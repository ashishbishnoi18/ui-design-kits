<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — NB UI Kit</title>
  <link rel="stylesheet" href="../css/nb-all.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="nb-auth-layout">

    <!-- ============================================================
         LEFT SIDE — FORM
         ============================================================ -->
    <div class="nb-auth-layout__form">
      <div class="nb-auth-layout__form-inner">

        <!-- Logo -->
        <div class="nb-mb-8">
          <a href="../index.html" class="nb-inline-flex nb-items-center nb-gap-2 nb-font-extrabold nb-text-xl nb-text-black" style="text-decoration: none;">
            <span class="nb-bg-green-500 nb-border nb-rounded nb-px-2 nb-py-1" style="line-height: 1;">NB</span>
          </a>
        </div>

        <!-- Heading -->
        <h1 class="nb-text-3xl nb-font-extrabold nb-mb-2">Welcome back</h1>
        <p class="nb-text-base nb-text-gray-500 nb-mb-8">Sign in to your account to continue</p>

        <!-- Magic Link Form -->
        <form action="#" method="post">

          <!-- Email -->
          <div class="nb-field">
            <label for="login-email" class="nb-label">Email address</label>
            <input type="email" id="login-email" name="email" class="nb-input" placeholder="you@example.com" required autocomplete="email">
          </div>

          <!-- Send magic link button -->
          <button type="submit" class="nb-btn nb-btn--primary nb-btn--full nb-btn--lg nb-mb-2">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22 6 12 13 2 6"/>
            </svg>
            Send magic link
          </button>
        </form>

        <!-- Divider -->
        <div class="nb-flex nb-items-center nb-gap-3 nb-my-6">
          <span class="nb-flex-1" style="border-top: 2px solid var(--nb-gray-200);"></span>
          <span class="nb-text-xs nb-text-gray-500 nb-whitespace-nowrap">or continue with</span>
          <span class="nb-flex-1" style="border-top: 2px solid var(--nb-gray-200);"></span>
        </div>

        <!-- Google Auth Button -->
        <button type="button" class="nb-btn nb-btn--outline nb-btn--full nb-btn--lg">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <!-- Bottom link -->
        <p class="nb-text-center nb-text-sm nb-text-gray-500 nb-mt-8">
          Don't have an account?
          <a href="signup.html" class="nb-font-semibold" style="color: var(--nb-black); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 2px;">Sign up</a>
        </p>

      </div>
    </div>

    <!-- ============================================================
         RIGHT SIDE — BRAND
         ============================================================ -->
    <div class="nb-auth-layout__brand">
      <div class="nb-auth-layout__brand-inner">

        <!-- Decorative shape top -->
        <div class="nb-auth-layout__shape nb-auth-layout__shape--top" aria-hidden="true"></div>

        <!-- Testimonial Card -->
        <div class="nb-auth-layout__testimonial">
          <blockquote>
            <p class="nb-text-xl nb-font-bold nb-mb-4" style="font-family: var(--nb-font-heading); line-height: 1.4; color: var(--nb-white);">
              "NB UI Kit transformed our development workflow. We shipped our entire frontend in half the time."
            </p>
            <footer class="nb-flex nb-items-center nb-gap-3">
              <div class="nb-avatar nb-avatar--sm nb-bg-yellow-500 nb-border" style="border-color: var(--nb-yellow-500);">
                <span class="nb-avatar__initials" style="color: var(--nb-black);">SK</span>
              </div>
              <div>
                <cite class="nb-font-semibold nb-text-sm" style="font-style: normal; color: var(--nb-white);">Sarah Kim</cite>
                <p class="nb-text-xs" style="color: var(--nb-gray-400);">Lead Engineer at Acme Corp</p>
              </div>
            </footer>
          </blockquote>
        </div>

        <!-- Stats Row -->
        <div class="nb-auth-layout__stats">
          <div class="nb-auth-layout__stat">
            <span class="nb-auth-layout__stat-number">10,000+</span>
            <span class="nb-auth-layout__stat-label">developers</span>
          </div>
          <div class="nb-auth-layout__stat">
            <span class="nb-auth-layout__stat-number">50+</span>
            <span class="nb-auth-layout__stat-label">components</span>
          </div>
          <div class="nb-auth-layout__stat">
            <span class="nb-auth-layout__stat-number">99.9%</span>
            <span class="nb-auth-layout__stat-label">uptime</span>
          </div>
        </div>

        <!-- Decorative shape bottom -->
        <div class="nb-auth-layout__shape nb-auth-layout__shape--bottom" aria-hidden="true"></div>

      </div>
    </div>

  </div>

  <script src="../js/nb-all.js"></script>
</body>
</html>
