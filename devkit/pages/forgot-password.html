<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — DevKit</title>
  <link rel="stylesheet" href="../css/dk-all.css">
  <style>
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 20px;
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      border-radius: var(--dk-radius-md);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--dk-transition-fast);
      text-decoration: none;
      line-height: 1.5;
      white-space: nowrap;
      width: 100%;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #000;
    }

    .auth-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .auth-logo_icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: var(--dk-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
      color: #000;
    }
    .auth-logo_text {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: var(--text-xl);
      color: var(--text-heading);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-header h1 {
      font-size: var(--text-xl);
      margin-bottom: 4px;
    }
    .auth-header p {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      line-height: 1.6;
    }
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      font-size: var(--text-sm);
      color: var(--text-tertiary);
    }
    .back-link a {
      color: var(--accent-text);
    }
    .back-link a:hover {
      text-decoration: underline;
    }
    .back-link svg {
      width: 14px;
      height: 14px;
    }

    .success-message {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo_icon">dk</div>
        <span class="auth-logo_text">DevKit</span>
      </div>

      <!-- Card -->
      <div class="dk-card">
        <div class="dk-card_body" style="padding:28px;">
          <div class="auth-header">
            <h1>Reset your password</h1>
            <p>Enter the email address associated with your account and we'll send you a link to reset your password.</p>
          </div>

          <form onsubmit="return false;">
            <!-- Email -->
            <div class="dk-field">
              <label class="dk-label" for="email">Email address</label>
              <input type="email" id="email" class="dk-input" placeholder="you@company.com" autocomplete="email">
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary">Send reset link</button>
          </form>

          <!-- Success alert (shown as example state) -->
          <div class="success-message">
            <div class="dk-alert dk-alert--success">
              <svg class="dk-alert_icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>
              <div class="dk-alert_content">
                <div class="dk-alert_title">Check your email</div>
                We've sent a password reset link to <strong>you@company.com</strong>. The link expires in 30 minutes.
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Back to login -->
      <div class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        <a href="login.html">Back to sign in</a>
      </div>

    </div>
  </div>

  <script src="../js/dk-core.js"></script>
  <script src="../js/dk-all.js"></script>
<script src="shared.js"></script>
</body>
</html>
