<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found — DevKit</title>
  <link rel="stylesheet" href="../css/dk-all.css">
  <style>
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 28px;
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 500;
      border-radius: var(--dk-radius-md);
      border: 1px solid transparent;
      cursor: pointer;
      transition: all var(--dk-transition-fast);
      text-decoration: none;
      line-height: 1.5;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }
    .btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #000;
    }
    .btn-outline {
      background: transparent;
      color: var(--text-primary);
      border-color: var(--border-default);
    }
    .btn-outline:hover {
      border-color: var(--border-hover);
      background: var(--bg-hover);
      color: var(--text-heading);
    }

    .error-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .error-content {
      max-width: 480px;
    }

    .error-code {
      font-family: var(--font-mono);
      font-size: clamp(80px, 15vw, 160px);
      font-weight: 700;
      color: var(--border-hover);
      line-height: 1;
      letter-spacing: -0.05em;
      margin-bottom: 16px;
      user-select: none;
    }

    .error-title {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--text-heading);
      margin-bottom: 12px;
    }

    .error-description {
      font-size: var(--text-base);
      color: var(--text-tertiary);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-footer {
      margin-top: 48px;
      font-size: var(--text-xs);
      color: var(--text-muted);
    }
    .error-footer a {
      color: var(--accent-text);
    }
    .error-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Page not found</h1>
      <p class="error-description">
        The page you are looking for does not exist or has been moved. Check the URL for typos, or navigate back to a known page.
      </p>
      <div class="error-actions">
        <a href="landing.html" class="btn btn-primary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Go back home
        </a>
        <a href="docs.html" class="btn btn-outline">
          View docs
        </a>
      </div>
      <div class="error-footer">
        <p>If you believe this is an error, <a href="#">contact support</a>.</p>
      </div>
    </div>
  </div>

  <script src="../js/dk-core.js"></script>
  <script src="../js/dk-all.js"></script>
<script src="shared.js"></script>
</body>
</html>
