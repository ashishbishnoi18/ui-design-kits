<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — DevKit</title>
  <link rel="stylesheet" href="../css/dk-all.css">
  <link rel="stylesheet" href="shared.css">
  <meta name="description" content="Create a DevKit account — get started for free">
  <meta property="og:title" content="Sign Up — DevKit">
  <meta property="og:description" content="Create a DevKit account — get started for free">
  <meta property="og:type" content="website">
  <style>
    /* Auth button full-width override */
    .auth-page .btn { width: 100%; }

    .auth-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .auth-logo_icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: var(--dk-radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
      color: #000;
    }
    .auth-logo_text {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: var(--text-xl);
      color: var(--text-heading);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .auth-header h1 {
      font-size: var(--text-xl);
      margin-bottom: 4px;
    }
    .auth-header p {
      font-size: var(--text-sm);
      color: var(--text-tertiary);
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border-default);
    }
    .divider span {
      font-size: var(--text-xs);
      color: var(--text-muted);
      text-transform: uppercase;
      font-family: var(--font-mono);
    }
    .social-buttons {
      display: flex;
      gap: 8px;
    }
    .social-buttons .btn {
      flex: 1;
    }
    .social-buttons .btn svg {
      width: 16px;
      height: 16px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: var(--text-sm);
      color: var(--text-tertiary);
    }
    .auth-footer a {
      color: var(--accent-text);
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }

    /* Password strength */
    .password-strength {
      margin-top: 8px;
    }
    .password-strength_text {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="dk-skip-nav">Skip to content</a>

  <div class="auth-page" id="main-content">
    <div class="auth-card">

      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo_icon">dk</div>
        <span class="auth-logo_text">DevKit</span>
      </div>

      <!-- Card -->
      <div class="dk-card">
        <div class="dk-card_body" data-slot="body" style="padding:28px;">
          <div class="auth-header">
            <h1>Create your account</h1>
            <p>Start building with DevKit in minutes</p>
          </div>

          <form onsubmit="return false;">
            <!-- Name -->
            <div class="dk-field" data-slot="field">
              <label class="dk-label" data-slot="label" for="name">Full name</label>
              <input type="text" id="name" class="dk-input" data-slot="control" placeholder="Jane Doe" autocomplete="name">
              <p class="form-error" aria-live="polite" hidden></p>
            </div>

            <!-- Email -->
            <div class="dk-field" data-slot="field">
              <label class="dk-label" data-slot="label" for="email">Email</label>
              <input type="email" id="email" class="dk-input" data-slot="control" placeholder="you@company.com" autocomplete="email">
              <p class="form-error" aria-live="polite" hidden></p>
            </div>

            <!-- Password -->
            <div class="dk-field" data-slot="field">
              <label class="dk-label" data-slot="label" for="password">Password</label>
              <div class="dk-password" data-dk-password>
                <input type="password" id="password" class="dk-password_input" placeholder="Create a strong password" autocomplete="new-password">
                <button type="button" class="dk-password_toggle" aria-label="Toggle password visibility">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
              </div>
              <p class="form-error" aria-live="polite" hidden></p>
              <!-- Password strength indicator -->
              <div class="password-strength">
                <div class="dk-progress dk-progress--sm">
                  <div class="dk-progress_track" data-slot="track">
                    <div class="dk-progress_bar" data-slot="bar" style="width: 60%; background: #eab308;"></div>
                  </div>
                </div>
                <div class="password-strength_text">Password strength: Medium</div>
              </div>
            </div>

            <!-- Terms -->
            <div class="dk-field" data-slot="field">
              <label class="dk-checkbox">
                <input type="checkbox" class="dk-checkbox_input" data-slot="input">
                <span class="dk-checkbox_box" data-slot="indicator"></span>
                <span class="dk-checkbox_label" data-slot="label">I agree to the <a href="#" style="color: var(--accent-text);">Terms of Service</a> and <a href="#" style="color: var(--accent-text);">Privacy Policy</a></span>
              </label>
            </div>

            <!-- Sign up button -->
            <button type="submit" class="btn btn-primary">Create account</button>
          </form>

          <!-- Divider -->
          <div class="divider"><span>or</span></div>

          <!-- Social auth -->
          <div class="social-buttons">
            <button class="btn btn-outline">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
              Google
            </button>
            <button class="btn btn-outline">
              <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
              GitHub
            </button>
          </div>
        </div>
      </div>

      <!-- Footer link -->
      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

    </div>
  </div>

  <script src="../js/dk-core.js"></script>
  <script src="../js/dk-all.js"></script>
<script src="shared.js"></script>
</body>
</html>
