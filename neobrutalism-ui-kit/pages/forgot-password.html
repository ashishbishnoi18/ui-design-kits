<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — NB UI Kit</title>
  <link rel="stylesheet" href="../css/nb-all.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="nb-auth-layout">

    <!-- ============================================================
         LEFT SIDE — FORM
         ============================================================ -->
    <div class="nb-auth-layout__form">
      <div class="nb-auth-layout__form-inner">

        <!-- Lock Icon -->
        <div class="nb-mb-6">
          <div class="nb-inline-flex nb-items-center nb-justify-center nb-bg-gray-100 nb-border nb-rounded-full" style="width: 56px; height: 56px;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>

        <!-- Heading -->
        <h1 class="nb-text-3xl nb-font-extrabold nb-mb-2">Forgot your password?</h1>
        <p class="nb-text-base nb-text-gray-500 nb-mb-8">Enter your email and we'll send you a reset link</p>

        <!-- Forgot Password Form -->
        <form action="#" method="post">

          <!-- Email -->
          <div class="nb-field" data-slot="field">
            <label for="reset-email" class="nb-label" data-slot="label">Email address</label>
            <input type="email" id="reset-email" name="email" class="nb-input" placeholder="you@example.com" required autocomplete="email" data-slot="control">
          </div>

          <!-- Send reset link button -->
          <button type="submit" class="nb-btn nb-btn--primary nb-btn--full nb-btn--lg">Send reset link</button>
        </form>

        <!-- Back to sign in -->
        <div class="nb-mt-8">
          <a href="login.html" class="nb-inline-flex nb-items-center nb-gap-2 nb-text-sm nb-font-medium" style="text-decoration: none; color: var(--nb-gray-600);">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="19" y1="12" x2="5" y2="12"/>
              <polyline points="12 19 5 12 12 5"/>
            </svg>
            Back to sign in
          </a>
        </div>

      </div>
    </div>

    <!-- ============================================================
         RIGHT SIDE — BRAND
         ============================================================ -->
    <div class="nb-auth-layout__brand">
      <div class="nb-auth-layout__brand-inner">

        <!-- Decorative shape top -->
        <div class="nb-auth-layout__shape nb-auth-layout__shape--top" aria-hidden="true"></div>

        <!-- Testimonial Card -->
        <div class="nb-auth-layout__testimonial">
          <blockquote>
            <p class="nb-text-xl nb-font-bold nb-mb-4" style="font-family: var(--nb-font-heading); line-height: 1.4; color: var(--nb-white);">
              "Best UI kit I've used. The neo-brutalist style is exactly what our brand needed."
            </p>
            <footer class="nb-flex nb-items-center nb-gap-3">
              <div class="nb-avatar nb-avatar--sm nb-bg-yellow-500 nb-border" style="border-color: var(--nb-yellow-500);">
                <span class="nb-avatar__initials" style="color: var(--nb-black);" data-slot="fallback">AT</span>
              </div>
              <div>
                <cite class="nb-font-semibold nb-text-sm" style="font-style: normal; color: var(--nb-white);">Alex Turner</cite>
                <p class="nb-text-xs" style="color: var(--nb-gray-400);">Design Lead at PixelCraft</p>
              </div>
            </footer>
          </blockquote>
        </div>

        <!-- Stats Row -->
        <div class="nb-auth-layout__stats">
          <div class="nb-auth-layout__stat">
            <span class="nb-auth-layout__stat-number">10,000+</span>
            <span class="nb-auth-layout__stat-label">developers</span>
          </div>
          <div class="nb-auth-layout__stat">
            <span class="nb-auth-layout__stat-number">50+</span>
            <span class="nb-auth-layout__stat-label">components</span>
          </div>
          <div class="nb-auth-layout__stat">
            <span class="nb-auth-layout__stat-number">99.9%</span>
            <span class="nb-auth-layout__stat-label">uptime</span>
          </div>
        </div>

        <!-- Decorative shape bottom -->
        <div class="nb-auth-layout__shape nb-auth-layout__shape--bottom" aria-hidden="true"></div>

      </div>
    </div>

  </div>

  <script src="../js/nb-all.js"></script>
</body>
</html>
